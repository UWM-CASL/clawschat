name: Verify

on:
  workflow_call:
    inputs:
      pages_base_path:
        required: false
        type: string
        default: /browser-llm-runner/

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E smoke
        run: pnpm test:e2e

      - name: Accessibility tests
        run: pnpm test:a11y

      - name: GitHub Pages subpath smoke
        env:
          PLAYWRIGHT_BASE_PATH: ${{ inputs.pages_base_path }}
          PLAYWRIGHT_PORT: "4174"
        run: pnpm exec playwright test tests/e2e/base-path.spec.js --project=desktop-chromium
